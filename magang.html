<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIMAGANG — Absensi Saya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0A1628;
      --navy-mid: #112240;
      --navy-card: #0F1E35;
      --blue: #1A56E8;
      --blue-light: #3B82F6;
      --blue-soft: rgba(59,130,246,0.12);
      --gold: #F0A500;
      --gold-light: #FBBF24;
      --green: #10B981;
      --green-soft: rgba(16,185,129,0.12);
      --red: #EF4444;
      --red-soft: rgba(239,68,68,0.12);
      --white: #F8FAFF;
      --gray: #94A3B8;
      --border: rgba(255,255,255,0.07);
    }

    html, body {
      min-height: 100vh;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(26,86,232,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,86,232,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,22,40,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .nav-left { display: flex; align-items: center; gap: 14px; }
    .nav-badge {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--blue), var(--blue-light));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
    }
    .nav-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }

    .user-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 13px;
    }
    .user-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(16,185,129,0.3);
    }

    .btn-logout {
      padding: 7px 16px;
      background: transparent;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #FC8181;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.1); }

    /* MAIN */
    main {
      position: relative; z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .page-header {
      margin-bottom: 36px;
      animation: fadeUp 0.5s ease both;
    }
    .greeting { font-size: 13px; color: var(--gold); font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .page-title { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 4px; }
    .page-date { font-size: 14px; color: var(--gray); }

    /* TODAY CARD */
    .today-card {
      background: linear-gradient(135deg, var(--navy-mid), #0D1F3C);
      border: 1px solid rgba(26,86,232,0.2);
      border-radius: 20px;
      padding: 28px 32px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s 0.1s ease both;
    }
    .today-card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(26,86,232,0.15), transparent 70%);
      pointer-events: none;
    }

    .today-label {
      font-size: 11px; font-weight: 500; color: var(--blue-light);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px;
    }
    .today-status-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 500;
    }
    .status-pill.hadir { background: var(--green-soft); color: var(--green); border: 1px solid rgba(16,185,129,0.25); }
    .status-pill.belum { background: rgba(148,163,184,0.1); color: var(--gray); border: 1px solid var(--border); }
    .status-pill.checkout { background: rgba(240,165,0,0.1); color: var(--gold); border: 1px solid rgba(240,165,0,0.25); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .time-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .time-box-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .time-box-val { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
    .time-box-val.empty { color: var(--gray); font-size: 16px; }

    .btn-absen {
      width: 100%;
      padding: 16px;
      border: none; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-checkin {
      background: linear-gradient(135deg, var(--green), #059669);
      color: white;
      box-shadow: 0 8px 20px rgba(16,185,129,0.3);
    }
    .btn-checkin:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(16,185,129,0.4); }
    .btn-checkout {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy);
      box-shadow: 0 8px 20px rgba(240,165,0,0.3);
    }
    .btn-checkout:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(240,165,0,0.4); }
    .btn-done {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--gray);
      cursor: not-allowed;
    }
    .btn-absen:disabled { opacity: 0.7; cursor: not-allowed; transform: none !important; }

    /* Catatan input */
    .catatan-group { margin-bottom: 16px; }
    .catatan-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
    }
    .catatan-input::placeholder { color: rgba(148,163,184,0.4); }
    .catatan-input:focus { border-color: var(--blue-light); }
    .catatan-label { font-size: 12px; color: var(--gray); margin-bottom: 8px; display: block; }

    /* HISTORY */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px; font-weight: 700;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title .badge-count {
      background: var(--blue-soft);
      color: var(--blue-light);
      padding: 2px 10px; border-radius: 100px; font-size: 13px;
    }

    .history-table-wrap {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      background: rgba(255,255,255,0.03);
      padding: 12px 16px;
      text-align: left;
      font-size: 11px; font-weight: 500;
      color: var(--gray);
      text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 500;
    }
    .badge.hadir { background: var(--green-soft); color: var(--green); }
    .badge.izin { background: rgba(250,204,21,0.1); color: #FBBF24; }
    .badge.alpha { background: var(--red-soft); color: var(--red); }

    .empty-state {
      text-align: center; padding: 48px 24px; color: var(--gray);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 14px 20px;
      border-radius: 12px; font-size: 14px; font-weight: 500;
      z-index: 999;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--green); color: white; }
    .toast.error { background: var(--red); color: white; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loading-row td { text-align: center; color: var(--gray); padding: 32px; }

    /* Pagination */
    .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 16px; }
    .page-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 8px; color: var(--gray); font-size: 13px; cursor: pointer;
      transition: all 0.2s;
    }
    .page-btn:hover, .page-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <nav>
    <div class="nav-left">
      <div class="nav-badge">BPS</div>
      <span class="nav-title">SIMAGANG</span>
    </div>
    <div class="nav-right">
      <div class="user-chip">
        <div class="user-dot"></div>
        <span id="namaNav">—</span>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Keluar</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <div class="greeting">Peserta Magang</div>
      <h1 class="page-title" id="namaTitle">Selamat datang!</h1>
      <p class="page-date" id="todayDate">—</p>
    </div>

    <!-- Today Card -->
    <div class="today-card">
      <div class="today-label">📋 Kehadiran Hari Ini</div>
      <div class="today-status-row">
        <div class="status-pill belum" id="statusPill">
          <div class="status-dot"></div>
          <span id="statusText">Belum Absen</span>
        </div>
        <span id="durasiText" style="font-size:13px;color:var(--gray);display:none;"></span>
      </div>

      <div class="time-grid">
        <div class="time-box">
          <div class="time-box-label">⏰ Check-in</div>
          <div class="time-box-val empty" id="checkInVal">—</div>
        </div>
        <div class="time-box">
          <div class="time-box-label">🏁 Check-out</div>
          <div class="time-box-val empty" id="checkOutVal">—</div>
        </div>
      </div>

      <div class="catatan-group" id="catatanGroup">
        <label class="catatan-label">Catatan (opsional)</label>
        <textarea class="catatan-input" id="catatanInput" rows="2" placeholder="Mis: WFH, ada keperluan, dll..."></textarea>
      </div>

      <button class="btn-absen btn-checkin" id="btnAbsen" onclick="handleAbsen()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
        Check-In Sekarang
      </button>
    </div>

    <!-- History -->
    <div class="section-title">
      Riwayat Absensi
      <span class="badge-count" id="totalCount">0</span>
    </div>

    <div class="history-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>Check-In</th>
            <th>Check-Out</th>
            <th>Durasi</th>
            <th>Status</th>
            <th>Catatan</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr class="loading-row"><td colspan="6">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    let currentUser = null;
    let currentProfile = null;
    let todayRecord = null;
    let currentPage = 1;
    const PER_PAGE = 10;

    (async () => {
      currentUser = await requireAuth('../index.html');
      if (!currentUser) return;

      currentProfile = await getUserProfile(currentUser.id);
      if (!currentProfile || currentProfile.role === 'admin') {
        window.location.href = '../pages/admin.html';
        return;
      }

      initPage();
    })();

    function initPage() {
      const nama = currentProfile.nama_lengkap || currentUser.email;
      document.getElementById('namaNav').textContent = nama;
      document.getElementById('namaTitle').textContent = `Halo, ${nama.split(' ')[0]}! 👋`;

      const now = new Date();
      document.getElementById('todayDate').textContent = now.toLocaleDateString('id-ID', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

      loadTodayAbsensi();
      loadHistory();
    }

    async function loadTodayAbsensi() {
      const today = new Date().toISOString().split('T')[0];
      const { data, error } = await db
        .from('absensi')
        .select('*')
        .eq('user_id', currentUser.id)
        .eq('tanggal', today)
        .single();

      todayRecord = data || null;
      renderTodayCard();
    }

    function renderTodayCard() {
      const pill = document.getElementById('statusPill');
      const statusText = document.getElementById('statusText');
      const checkInVal = document.getElementById('checkInVal');
      const checkOutVal = document.getElementById('checkOutVal');
      const btnAbsen = document.getElementById('btnAbsen');
      const durasiText = document.getElementById('durasiText');
      const catatanGroup = document.getElementById('catatanGroup');

      if (!todayRecord) {
        // Belum absen
        pill.className = 'status-pill belum';
        statusText.textContent = 'Belum Check-in';
        checkInVal.textContent = '—'; checkInVal.className = 'time-box-val empty';
        checkOutVal.textContent = '—'; checkOutVal.className = 'time-box-val empty';
        btnAbsen.className = 'btn-absen btn-checkin';
        btnAbsen.innerHTML = `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg> Check-In Sekarang`;
        btnAbsen.disabled = false;
        catatanGroup.style.display = '';
        durasiText.style.display = 'none';
      } else if (todayRecord.checkout_time) {
        // Sudah checkout
        pill.className = 'status-pill checkout';
        statusText.textContent = 'Selesai';
        checkInVal.textContent = formatTime(todayRecord.checkin_time); checkInVal.className = 'time-box-val';
        checkOutVal.textContent = formatTime(todayRecord.checkout_time); checkOutVal.className = 'time-box-val';
        const dur = calcDurasi(todayRecord.checkin_time, todayRecord.checkout_time);
        durasiText.textContent = `Durasi: ${dur}`; durasiText.style.display = '';
        btnAbsen.className = 'btn-absen btn-done';
        btnAbsen.innerHTML = '✅ Absensi Selesai';
        btnAbsen.disabled = true;
        catatanGroup.style.display = 'none';
      } else {
        // Sudah checkin, belum checkout
        pill.className = 'status-pill hadir';
        statusText.textContent = 'Sudah Check-in';
        checkInVal.textContent = formatTime(todayRecord.checkin_time); checkInVal.className = 'time-box-val';
        checkOutVal.textContent = '—'; checkOutVal.className = 'time-box-val empty';
        durasiText.style.display = 'none';
        btnAbsen.className = 'btn-absen btn-checkout';
        btnAbsen.innerHTML = `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg> Check-Out Sekarang`;
        btnAbsen.disabled = false;
        catatanGroup.style.display = 'none';
      }
    }

    async function handleAbsen() {
      const btn = document.getElementById('btnAbsen');
      btn.disabled = true;
      const catatan = document.getElementById('catatanInput').value;
      const now = new Date();
      const today = now.toISOString().split('T')[0];
      const timeStr = now.toTimeString().split(' ')[0]; // HH:MM:SS

      if (!todayRecord) {
        // Check-in
        const { data, error } = await db.from('absensi').insert({
          user_id: currentUser.id,
          tanggal: today,
          checkin_time: timeStr,
          catatan: catatan || null,
          status: 'hadir'
        }).select().single();

        if (error) { showToast('Gagal check-in: ' + error.message, 'error'); btn.disabled = false; return; }
        todayRecord = data;
        showToast('✅ Check-in berhasil! ' + formatTime(timeStr), 'success');
      } else {
        // Check-out
        const { data, error } = await db.from('absensi')
          .update({ checkout_time: timeStr })
          .eq('id', todayRecord.id)
          .select().single();

        if (error) { showToast('Gagal check-out: ' + error.message, 'error'); btn.disabled = false; return; }
        todayRecord = data;
        showToast('👋 Check-out berhasil! ' + formatTime(timeStr), 'success');
      }

      renderTodayCard();
      loadHistory();
    }

    async function loadHistory() {
      const from = (currentPage - 1) * PER_PAGE;
      const to = from + PER_PAGE - 1;

      const { data, error, count } = await db
        .from('absensi')
        .select('*', { count: 'exact' })
        .eq('user_id', currentUser.id)
        .order('tanggal', { ascending: false })
        .range(from, to);

      document.getElementById('totalCount').textContent = count || 0;

      const tbody = document.getElementById('historyBody');
      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Belum ada data absensi</div></div></td></tr>`;
        return;
      }

      tbody.innerHTML = data.map(row => {
        const durasi = row.checkin_time && row.checkout_time ? calcDurasi(row.checkin_time, row.checkout_time) : '—';
        return `<tr>
          <td>${formatTanggal(row.tanggal)}</td>
          <td>${row.checkin_time ? formatTime(row.checkin_time) : '—'}</td>
          <td>${row.checkout_time ? formatTime(row.checkout_time) : '—'}</td>
          <td>${durasi}</td>
          <td><span class="badge ${row.status}">${capitalize(row.status)}</span></td>
          <td style="color:var(--gray);font-size:13px">${row.catatan || '—'}</td>
        </tr>`;
      }).join('');

      // Pagination
      const totalPages = Math.ceil((count || 0) / PER_PAGE);
      renderPagination(totalPages);
    }

    function renderPagination(total) {
      const el = document.getElementById('pagination');
      if (total <= 1) { el.innerHTML = ''; return; }
      let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
      for (let i = 1; i <= total; i++) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      }
      html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>Next ›</button>`;
      el.innerHTML = html;
    }

    function goPage(p) { currentPage = p; loadHistory(); }

    async function handleLogout() {
      await db.auth.signOut();
      window.location.href = '../index.html';
    }

    // Helpers
    function formatTime(t) {
      if (!t) return '—';
      return t.substring(0, 5); // HH:MM
    }
    function formatTanggal(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('id-ID', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
    }
    function calcDurasi(start, end) {
      const s = start.split(':').map(Number);
      const e = end.split(':').map(Number);
      const startMin = s[0]*60 + s[1];
      const endMin = e[0]*60 + e[1];
      const diff = endMin - startMin;
      if (diff < 0) return '—';
      const h = Math.floor(diff/60);
      const m = diff % 60;
      return `${h}j ${m}m`;
    }
    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3500);
    }
  </script>
</body>
</html>
